# First-pass loose fusion for dog_vins_localization.
# Output topic under the node namespace: odometry/filtered.
frequency: 20
sensor_timeout: 0.5
two_d_mode: true

publish_tf: false
publish_acceleration: false
predict_to_current_time: true

map_frame: map
odom_frame: odom
base_link_frame: base_link
world_frame: odom

# VINS pose after frame normalization by vins_odom_adapter.py.
odom0: /dog_vins/odom_base_link
odom0_queue_size: 50
odom0_nodelay: true
odom0_config: [true,  true,  false,
               false, false, true,
               false, false, false,
               false, false, false,
               false, false, false]
odom0_differential: false
odom0_relative: false

# Leg odometry from the motion host. Use it as velocity feedback in this
# first-pass fusion so it does not fight VINS absolute pose directly.
odom1: /leg_odom2
odom1_queue_size: 50
odom1_nodelay: true
odom1_config: [false, false, false,
               false, false, false,
               true,  true,  false,
               false, false, true,
               false, false, false]
odom1_differential: false
odom1_relative: false

# External robot IMU from message_transformer/qnx2ros.
imu0: /imu/data
imu0_queue_size: 100
imu0_nodelay: true
imu0_config: [false, false, false,
              true,  true,  true,
              false, false, false,
              true,  true,  true,
              false, false, false]
imu0_differential: false
imu0_relative: true
imu0_remove_gravitational_acceleration: false

print_diagnostics: true
debug: false
