%YAML:1.0

# Machine-dog D435i RGB + external motion-host IMU trial config.
# Use only when another launch already publishes /camera/color/image_raw and
# /imu/data. For fully standalone VINS, use dog_mono_d435i_internal_imu_config.yaml.

# Common parameters
# support: 1 imu 1 cam; 1 imu 2 cam; 2 cam
imu: 1
num_of_cam: 1

# Inputs published by an external sensor/bridge launch.
imu_topic: "/imu/data"
image0_topic: "/camera/color/image_raw"
image1_topic: "/unused"

# Keep VINS outputs away from comp2026_ws logs/bags. The launch creates this.
output_path: "/tmp/dog_vins_output"
pose_graph_save_path: "/tmp/dog_vins_output/pose_graph/"

cam0_calib: "dog_color_pinhole_1280x720.yaml"
cam1_calib: "dog_color_pinhole_1280x720.yaml"
image_width: 1280
image_height: 720

# Extrinsic parameter between IMU/body and camera.
# /imu/data is currently produced from the motion host with frame_id=base_link,
# not from the D435i internal IMU. This initial transform is only a starting
# guess from the existing base_link -> camera_link record and standard optical
# camera axes. Keep estimate_extrinsic=1 until the real extrinsic is calibrated.
estimate_extrinsic: 1

body_T_cam0: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [ 0.0,  0.0,  1.0,  0.20,
          -1.0,  0.0,  0.0,  0.00,
           0.0, -1.0,  0.0,  0.00,
           0.0,  0.0,  0.0,  1.00 ]

# Multiple thread support
multiple_thread: 1

# Feature tracker parameters
max_cnt: 150
min_dist: 30
freq: 10
F_threshold: 1.0
show_track: 1
flow_back: 1

# Optimization parameters
max_solver_time: 0.04
max_num_iterations: 8
keyframe_parallax: 10.0

# IMU parameters.
# These are conservative placeholders copied from upstream examples.
# Replace after measuring /imu/data noise and confirming units/timestamps.
acc_n: 0.1
gyr_n: 0.01
acc_w: 0.001
gyr_w: 0.0001
g_norm: 9.805

# Unsynchronization parameters.
# The camera and motion-host IMU likely do not share hardware sync, so allow
# online time-offset estimation during early trials.
estimate_td: 1
td: 0.0

# Loop closure parameters
load_previous_pose_graph: 0
save_image: 0
