%YAML:1.0

# D435i stereo-only fallback for cases where the D435i motion module does not
# publish /camera/imu reliably. This does not use the robot global parameters.
imu: 0
num_of_cam: 2

image0_topic: "/camera/infra1/image_rect_raw"
image1_topic: "/camera/infra2/image_rect_raw"
output_path: "/tmp/dog_vins_output"

cam0_calib: "dog_d435i_infra_left_640x480.yaml"
cam1_calib: "dog_d435i_infra_right_640x480.yaml"
image_width: 640
image_height: 480

# Stereo extrinsics are initialized from VINS-Fusion's D435i example. Treat
# this as a first-run fallback; replace with a machine-specific calibration.
estimate_extrinsic: 0

body_T_cam0: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [ -5.7586305857286746e-03, -4.0463318787729019e-03,
       9.9997523237933461e-01, 2.0329267950355900e-02,
       -9.9998287214160420e-01, -1.0224590553211677e-03,
       -5.7628118925283633e-03, 7.9325209639615653e-03,
       1.0457519809151661e-03, -9.9999129084997906e-01,
       -4.0403746097850135e-03, 2.8559824645148020e-03, 0., 0., 0., 1. ]

body_T_cam1: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [ -1.0021770212322867e-03, 3.6313480322730518e-04,
       9.9999943188700535e-01, 1.5285779565991807e-02,
       -9.9999216342926500e-01, -3.8303422615924010e-03,
       -1.0007788055728661e-03, -5.2435791444330505e-02,
       3.8299766679101843e-03, -9.9999259827824449e-01,
       3.6697063849344680e-04, 8.6931302450199057e-03, 0., 0., 0., 1. ]

multiple_thread: 1

max_cnt: 150
min_dist: 30
freq: 10
F_threshold: 1.0
show_track: 0
flow_back: 1

max_solver_time: 0.04
max_num_iterations: 8
keyframe_parallax: 10.0

estimate_td: 0
td: 0.0

load_previous_pose_graph: 0
pose_graph_save_path: "/tmp/dog_vins_output/pose_graph/"
save_image: 0
